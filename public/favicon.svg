<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1628"/>
      <stop offset="100%" stop-color="#1a2540"/>
    </linearGradient>
  </defs>
  <!-- Fundo arredondado -->
  <rect width="64" height="64" rx="14" fill="url(#g2)"/>
  <!-- Círculo externo -->
  <circle cx="32" cy="32" r="20" stroke="url(#g1)" stroke-width="2.5" fill="none" opacity="0.5"/>
  <!-- Círculo médio -->
  <circle cx="32" cy="32" r="13" stroke="url(#g1)" stroke-width="2.5" fill="none" opacity="0.75"/>
  <!-- Círculo interno (preenchido) -->
  <circle cx="32" cy="32" r="6" fill="url(#g1)"/>
  <!-- Linha horizontal -->
  <line x1="8" y1="32" x2="22" y2="32" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="42" y1="32" x2="56" y2="32" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Linha vertical -->
  <line x1="32" y1="8" x2="32" y2="22" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="42" x2="32" y2="56" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>
</svg>
