# ============================================================
#  Hermes Insight Engine — Docker Compose PRODUCAO
#
#  Monorepo — tudo na mesma pasta:
#    /opt/hermes/          <- raiz do monorepo
#    /opt/hermes/backend/  <- API (icp_radar)
#    /opt/hermes/.env      <- variaveis de producao
#
#  Deploy:
#    cd /opt/hermes && docker compose -f docker-compose.prod.yml up -d
# ============================================================

services:

  redis:
    image: redis:7-alpine
    container_name: hermes-redis
    command:
      - redis-server
      - --appendonly yes
      - --requirepass ${REDIS_PASSWORD}
      - --maxmemory 256mb
      - --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - hermes-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 300M

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hermes-api
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - HERMES_AUTH_REQUIRED=true
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - HERMES_DUCKDB_PATH=/data/cnpj.duckdb
      - ASAAS_SANDBOX=false
      - SEARXNG_URL=http://searxng:8080
    volumes:
      - duckdb_data:/data:ro
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy
      searxng:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      hermes-network:
        ipv4_address: 172.21.0.10   # IP fixo — usado pelo prometheus para scraping
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 3G
        reservations:
          memory: 1G

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hermes-worker
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - HERMES_DUCKDB_PATH=/data/cnpj.duckdb
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SEARXNG_URL=http://searxng:8080
    volumes:
      - duckdb_data:/data
    command: ["python", "-m", "icp_worker"]
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
      searxng:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hermes-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1536M
        reservations:
          memory: 256M

  searxng:
    image: searxng/searxng:latest
    container_name: hermes-searxng
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
      - SEARXNG_SECRET=hermes-search-secret-2026
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - hermes-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    container_name: hermes-web
    # Porta 8082 no host → porta 80 interna do nginx
    # EasyPanel/Traefik roteia o domínio externo para esta porta
    ports:
      - "8082:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      # Usa 127.0.0.1 (IPv4) — evita falha por IPv6 no Alpine
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - hermes-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # nginx externo removido — EasyPanel/Traefik já gerencia portas 80/443
  # Para reativar (VPS sem EasyPanel), descomente o bloco abaixo:
  # nginx:
  #   image: nginx:1.27-alpine
  #   container_name: hermes-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
  #   depends_on:
  #     - web
  #     - api
  #   restart: unless-stopped
  #   networks:
  #     - hermes-network

volumes:
  redis_data:
    driver: local
  duckdb_data:
    driver: local

networks:
  hermes-network:
    name: hermes-network   # nome explícito para referenciar de outros composes (ex: monitoring)
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24
