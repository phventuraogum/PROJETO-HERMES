server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers
  server_tokens off;
  add_header X-Content-Type-Options        "nosniff"                              always;
  add_header X-Frame-Options               "SAMEORIGIN"                           always;
  add_header X-XSS-Protection             "1; mode=block"                        always;
  add_header Referrer-Policy               "strict-origin-when-cross-origin"      always;
  add_header Permissions-Policy            "geolocation=(), microphone=(), camera=()" always;
  add_header Strict-Transport-Security     "max-age=31536000; includeSubDomains"  always;
  add_header Content-Security-Policy
    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://hermescraper.com; font-src 'self' data:; frame-ancestors 'none';"
    always;

  # API calls: frontend usa sempre /api/* como prefixo
  # /api/ → strips prefix → encaminha para backend:8000
  location /api/ {
    proxy_pass http://api:8000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    # SSE / Streaming (prospeccao/run-stream)
    proxy_buffering off;
    proxy_cache off;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  # SPA (React Router) — DEVE ser o ultimo location
  # Serve index.html para todas as rotas: /login, /dashboard, /pipeline, etc.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
