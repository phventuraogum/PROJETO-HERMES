# ============================================================
#  Hermes Insight Engine — Nginx PRODUCAO
#
#  Modo atual: HTTP (sem dominio/SSL)
#  Quando tiver dominio:
#    1. Substituir srv887957.hstgr.cloud pelo dominio
#    2. Rodar: certbot --nginx -d seudominio.com.br
#    3. Descomentar bloco HTTPS e redirect
# ============================================================

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=web_limit:10m rate=60r/m;

server {
    listen 80;
    listen [::]:80;
    server_name srv887957.hstgr.cloud 31.97.241.171;

    # Certbot challenge (para quando adicionar SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Security Headers ────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header X-XSS-Protection           "0"                                    always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co https://api.asaas.com wss://*.supabase.co; frame-ancestors 'self';" always;

    server_tokens off;
    client_max_body_size 1M;

    # ── BLOQUEAR rotas sensiveis ────────────────────────────
    location ~ ^/(docs|redoc|openapi\.json) {
        return 404;
    }

    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Frontend React (SPA) ────────────────────────────────
    location / {
        limit_req zone=web_limit burst=20 nodelay;
        proxy_pass         http://web:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── API Backend (/api/ prefix) ──────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Auth (rate limit restrito) ──────────────────────────
    location /auth/ {
        limit_req zone=api_limit burst=3 nodelay;
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Planos (publico) ────────────────────────────────────
    location = /plans {
        limit_req zone=web_limit burst=5 nodelay;
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    # ── Rotas diretas da API ────────────────────────────────
    location ~ ^/(prospeccao|mapa-calor|credits|pipeline|crm|subscribe)(/|$) {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Health check (publico) ──────────────────────────────
    location = /health {
        proxy_pass         http://api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    # ── Webhooks Asaas (HMAC + IP allowlist) ────────────────
    location /webhooks/asaas {
        allow 54.94.136.0/24;
        allow 54.207.0.0/16;
        allow 18.229.0.0/16;
        allow 18.230.0.0/16;
        allow 18.231.0.0/16;
        allow 15.228.0.0/16;
        allow 177.71.192.0/18;
        deny all;

        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Admin ───────────────────────────────────────────────
    location /admin {
        limit_req zone=api_limit burst=3 nodelay;
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/hermes_access.log;
    error_log  /var/log/nginx/hermes_error.log warn;
}
