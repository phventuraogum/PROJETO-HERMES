# ============================================================
#  Hermes — Stack de Observabilidade
#
#  Serviços:
#    prometheus   → coleta métricas (porta interna 9090)
#    grafana      → dashboards e alertas  (porta host 3001)
#    node-exporter → métricas da VPS: CPU/RAM/disco/rede
#    cadvisor     → métricas por container Docker
#
#  Subir:
#    cd /opt/hermes
#    docker compose -f docker-compose.monitoring.yml up -d
#
#  Grafana:  http://<VPS_IP>:3001  (user: admin / senha: ver GRAFANA_PASSWORD)
#  Prometheus: acessível apenas internamente (sem porta exposta)
# ============================================================

services:

  # ── Prometheus ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: hermes-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=10GB"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    networks:
      monitoring-network:
        ipv4_address: 172.22.0.10
      hermes-network: {}        # acessa hermes-api via IP estático
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ── Grafana ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana-oss:10.4.2
    container_name: hermes-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-Hermes@Grafana2025}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_LOG_LEVEL=warn
      - GF_SERVER_ROOT_URL=http://%(domain)s:3001
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/hermes-overview.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      monitoring-network:
        ipv4_address: 172.22.0.13
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ── Node Exporter (métricas da VPS) ─────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: hermes-node-exporter
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
      - "--collector.netdev.device-exclude=^(veth|docker|br-|lo)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    expose:
      - "9100"
    networks:
      monitoring-network:
        ipv4_address: 172.22.0.11
    pid: host
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

  # ── cAdvisor (métricas por container) ───────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: hermes-cadvisor
    privileged: true
    command:
      - "--housekeeping_interval=30s"
      - "--docker_only=true"
      - "--disable_metrics=advtcp,cpuset,hugetlb,memory_numa,process,referenced_memory,resctrl,sched,tcp,udp"
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    expose:
      - "8080"
    networks:
      monitoring-network:
        ipv4_address: 172.22.0.12
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M

# ── Redes ────────────────────────────────────────────────
networks:
  monitoring-network:
    name: hermes-monitoring
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/24

  hermes-network:
    external: true        # criada pelo docker-compose.prod.yml
    name: hermes-network  # nome explícito definido lá

# ── Volumes ──────────────────────────────────────────────
volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
